<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#06080f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Night Watch" />
  <meta name="description" content="Aurora hunting map — Northeast US & SE Canada" />

  <!-- PWA manifest -->
  <link rel="manifest" href="/night-watch/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/night-watch/logo.jpg" />

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="/night-watch/logo.jpg" />

  <title>Night Watch</title>
</head>
<body>
  <!-- Landscape rotation overlay — CSS shows this when phone is sideways -->
  <div id="rotate-overlay" style="
    display: none;
    position: fixed; inset: 0; z-index: 99999;
    background: #06080f;
    flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    font-family: 'DejaVu Sans Mono', Consolas, monospace;
    text-align: center;
  ">
    <div style="font-size: 36px;">↩️</div>
    <div style="color: #44ddaa; font-size: 12px; letter-spacing: 2px;">PLEASE ROTATE</div>
    <div style="color: #445566; font-size: 10px; letter-spacing: 1px;">Night Watch works best in portrait mode</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
